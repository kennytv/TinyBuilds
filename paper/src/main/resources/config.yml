# Blocks that will never be merged into a single stretched block display,
# e.g. because their texture or model would visibly repeat/deform.
excluded-from-stretching:
  - oak_door

# How often rotating groups send an update to clients, in ticks. Clients smoothly
# interpolate between updates, so higher values massively reduce packets and server
# work with barely any visual difference. Automatically lowered for fast rotations.
rotation-update-interval-ticks: 10

# Maximum number of blocks a WorldEdit selection may contain for /tinybuilds place.
max-selection-volume: 500000

# Hard cap on the number of display entities, even if the selection itself is within the volume limit.
max-display-entities: 10000

# View range multiplier for spawned displays (1.0 = the default entity view range,
# usually around 64 blocks). Lower values mean distant players never receive or
# track the entities at all; raise it if huge groups should be visible from afar.
display-view-range: 1.0

# Whether to remove display entities on chunk load that claim to belong to a group
# but aren't tracked by it (anymore), e.g. left over from a crash before the group
# file was written.
remove-orphaned-displays: true
